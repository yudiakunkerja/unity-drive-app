<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Drive - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md text-center border border-slate-100">
        <div class="flex justify-center mb-6">
            <div class="bg-indigo-600 p-4 rounded-2xl shadow-lg shadow-indigo-200">
                <i class="fas fa-cloud text-3xl text-white"></i>
            </div>
        </div>

        <h1 class="text-3xl font-bold text-slate-800 mb-2">Unity Drive</h1>
        <p class="text-slate-500 mb-8">Hubungkan semua cloud storage Anda menjadi satu penyimpanan raksasa.</p>

        <button onclick="window.location.href='dashboard.html'" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 py-3 px-4 rounded-xl font-semibold text-slate-700 hover:bg-slate-50 transition-all active:scale-95 shadow-sm">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" class="w-6">
            Sign in with Google
        </button>

        <p class="mt-8 text-xs text-slate-400 uppercase tracking-widest font-bold">Secure OAuth 2.0 Connection</p>
    </div>

</body>
</html>
