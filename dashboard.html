<div class="mt-10">
    <h3 class="text-xl font-bold text-slate-800 mb-6 text-left">Jelajahi Gudang Kapasitas (Gratis)</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        
        <div class="bg-white p-4 rounded-2xl border-2 border-indigo-500 shadow-sm relative">
            <span class="absolute -top-2 -right-2 bg-indigo-500 text-white text-[10px] px-2 py-1 rounded-full">Induk</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" class="w-10 mb-2">
            <p class="font-bold text-sm">G-Drive</p>
            <p class="text-[10px] text-emerald-600 font-bold">TERHUBUNG</p>
        </div>

        <div id="btn-terabox" onclick="connectCloud('TeraBox', 1024)" class="bg-white p-4 rounded-2xl border border-slate-200 hover:border-indigo-400 cursor-pointer transition">
            <img src="https://m.terabox.com/static/images/logo.png" class="w-10 mb-2">
            <p class="font-bold text-sm">TeraBox</p>
            <p class="text-[10px] text-slate-400">+1 TB Gratis</p>
        </div>

        <div onclick="connectCloud('Mega', 20)" class="bg-white p-4 rounded-2xl border border-slate-200 hover:border-indigo-400 cursor-pointer transition">
            <i class="fab fa-m text-red-600 text-2xl mb-2"></i>
            <p class="font-bold text-sm">Mega.nz</p>
            <p class="text-[10px] text-slate-400">+20 GB Gratis</p>
        </div>

        <div onclick="connectCloud('MediaFire', 10)" class="bg-white p-4 rounded-2xl border border-slate-200 hover:border-indigo-400 cursor-pointer transition">
            <i class="fas fa-fire text-orange-500 text-2xl mb-2"></i>
            <p class="font-bold text-sm">MediaFire</p>
            <p class="text-[10px] text-slate-400">+10 GB Gratis</p>
        </div>

    </div>
</div>
