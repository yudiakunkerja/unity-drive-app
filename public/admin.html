<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - PNM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .toast { animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <!-- Toast Notification Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <div class="container mx-auto px-4 py-8">
    
    <!-- Login Form -->
    <div id="login-form" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 mt-20">
      <h2 class="text-2xl font-bold text-center text-teal-800 mb-2">🔐 Admin Access</h2>
      <p class="text-center text-gray-500 text-sm mb-6" id="form-title">Silakan login untuk melanjutkan</p>
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="admin-username" placeholder="Masukkan username" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="admin-password" placeholder="Masukkan password" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
        </div>
      </div>
      
      <button onclick="handleAuth()" id="auth-btn" class="w-full bg-teal-600 hover:bg-teal-700 text-white py-3 rounded-lg font-bold mt-6 transition">Login</button>
      
      <p class="text-center text-sm text-gray-600 mt-4">
        <span id="toggle-text">Belum punya akun?</span>
        <button onclick="toggleForm()" class="text-teal-600 font-semibold hover:underline ml-1" id="toggle-btn">Daftar disini</button>
      </p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-teal-800">📊 Dashboard Laporan</h1>
          <p class="text-gray-600 text-sm">Halo, <span id="admin-username-display" class="font-semibold"></span></p>
        </div>
        <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg transition">Logout</button>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow border-l-4 border-teal-500">
          <p class="text-gray-600 text-sm">Total Laporan</p>
          <p id="stat-total" class="text-3xl font-bold text-teal-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow border-l-4 border-blue-500">
          <p class="text-gray-600 text-sm">📷 Site Reports</p>
          <p id="stat-site" class="text-3xl font-bold text-blue-600">0</p>
        </div>
        <div class="bg-white p-4 rounded-xl shadow border-l-4 border-green-500">
          <p class="text-gray-600 text-sm">📄 Dokumen</p>
          <p id="stat-doc" class="text-3xl font-bold text-green-600">0</p>
        </div>
      </div>

      <!-- Reports Table -->
      <div class="bg-white rounded-xl shadow overflow-x-auto">
        <div class="p-4 border-b flex justify-between items-center">
          <h3 class="font-semibold text-gray-700">Daftar Laporan Terbaru</h3>
          <button onclick="loadReports()" class="text-sm text-teal-600 hover:underline">🔄 Refresh</button>
        </div>
        <table class="w-full">
          <thead class="bg-teal-600 text-white">
            <tr>
              <th class="px-4 py-3 text-left text-sm font-medium">Waktu</th>
              <th class="px-4 py-3 text-left text-sm font-medium">Tipe</th>
              <th class="px-4 py-3 text-left text-sm font-medium">Lokasi</th>
              <th class="px-4 py-3 text-left text-sm font-medium">Catatan</th>
              <th class="px-4 py-3 text-left text-sm font-medium">Aksi</th>
            </tr>
          </thead>
          <tbody id="reports-table" class="divide-y divide-gray-100">
            <!-- Data will be injected here -->
          </tbody>
        </table>
        <div id="loading" class="hidden p-8 text-center text-gray-500">Memuat data...</div>
        <div id="empty-state" class="hidden p-8 text-center text-gray-500">Belum ada laporan.</div>
      </div>
    </div>
  </div>

  <script>
    // ================= CONFIG & STATE =================
    const API_BASE = ''; // Kosong karena deploy di Vercel dengan path relatif
    let authToken = localStorage.getItem('admin_token');
    let currentUsername = localStorage.getItem('admin_username');
    let isLoginMode = true;

    // ================= UTILS =================
    function showToast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const toast = document.createElement('div');
      toast.className = `toast ${colors[type] || colors.info} text-white px-6 py-3 rounded-lg shadow-lg max-w-sm`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function setLoading(element, loading) {
      element.disabled = loading;
      element.innerHTML = loading ? '<span class="animate-pulse">Loading...</span>' : element.dataset.originalText;
    }

    // ================= AUTH FUNCTIONS =================
    function toggleForm() {
      isLoginMode = !isLoginMode;
      document.getElementById('form-title').textContent = isLoginMode ? 'Silakan login untuk melanjutkan' : 'Buat akun admin baru';
      document.getElementById('auth-btn').textContent = isLoginMode ? 'Login' : 'Daftar Akun';
      document.getElementById('toggle-text').textContent = isLoginMode ? 'Belum punya akun?' : 'Sudah punya akun?';
      document.getElementById('toggle-btn').textContent = isLoginMode ? 'Daftar disini' : 'Login disini';
      document.getElementById('admin-username').value = '';
      document.getElementById('admin-password').value = '';
    }

    async function handleAuth() {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;
      const btn = document.getElementById('auth-btn');
      
      if (!username || !password) {
        showToast('Username dan password wajib diisi', 'warning');
        return;
      }

      const originalText = btn.textContent;
      btn.dataset.originalText = originalText;
      setLoading(btn, true);

      try {
        const res = await fetch(`${API_BASE}/api/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: isLoginMode ? 'login' : 'register',
            username: username,
            password: password
          })
        });

        const data = await res.json();

        if (res.ok) {
          if (isLoginMode) {
            // Login Success
            authToken = data.token;
            currentUsername = data.username;
            localStorage.setItem('admin_token', authToken);
            localStorage.setItem('admin_username', currentUsername);
            showToast('Login berhasil!', 'success');
            showDashboard();
          } else {
            // Register Success
            showToast(data.message || 'Akun berhasil dibuat!', 'success');
            isLoginMode = true;
            toggleForm(); // Switch back to login form
          }
        } else {
          // Handle specific error messages from backend
          if (data.error && data.error.includes('5x')) {
            showToast(data.error, 'error');
            // Auto clear form after account deletion
            document.getElementById('admin-username').value = '';
            document.getElementById('admin-password').value = '';
          } else {
            showToast(data.error || 'Terjadi kesalahan', 'error');
          }
        }
      } catch (e) {
        showToast('Koneksi error: ' + e.message, 'error');
      } finally {
        setLoading(btn, false);
      }
    }

    function showDashboard() {
      document.getElementById('login-form').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('admin-username-display').textContent = currentUsername || 'Admin';
      loadReports();
    }

    function logout() {
      authToken = null;
      currentUsername = null;
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_username');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('admin-password').value = '';
      showToast('Anda telah logout', 'info');
    }

    // ================= REPORTS FUNCTIONS =================
    async function loadReports() {
      if (!authToken) { logout(); return; }

      const loadingEl = document.getElementById('loading');
      const emptyEl = document.getElementById('empty-state');
      const tableBody = document.getElementById('reports-table');
      
      loadingEl.classList.remove('hidden');
      emptyEl.classList.add('hidden');
      tableBody.innerHTML = '';

      try {
        const res = await fetch(`${API_BASE}/api/admin-reports`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        // Handle token expiry (401)
        if (res.status === 401) {
          showToast('Sesi login telah berakhir. Silakan login ulang.', 'warning');
          logout();
          return;
        }

        const data = await res.json();
        
        if (!data.success) throw new Error(data.error || 'Failed to load reports');

        const reports = data.reports || [];
        
        // Update stats
        document.getElementById('stat-total').textContent = reports.length;
        document.getElementById('stat-site').textContent = reports.filter(r => r.type === 'site').length;
        document.getElementById('stat-doc').textContent = reports.filter(r => r.type === 'doc').length;
        
        // Render table
        if (reports.length === 0) {
          emptyEl.classList.remove('hidden');
        } else {
          tableBody.innerHTML = reports.map(r => {
            const timeStr = r.timestamp ? new Date(r.timestamp).toLocaleString('id-ID') : '-';
            const typeBadge = r.type === 'site' 
              ? '<span class="px-2 py-1 rounded text-xs bg-blue-100 text-blue-800">📷 Site</span>'
              : '<span class="px-2 py-1 rounded text-xs bg-green-100 text-green-800">📄 Dokumen</span>';
            
            return `
              <tr class="hover:bg-gray-50 transition">
                <td class="px-4 py-3 text-sm text-gray-700">${timeStr}</td>
                <td class="px-4 py-3">${typeBadge}</td>
                <td class="px-4 py-3 text-sm text-gray-600">${r.location || r.note ? '📍 ' + (r.location || '') : '-'}</td>
                <td class="px-4 py-3 text-sm text-gray-600 max-w-xs truncate" title="${r.note || ''}">${r.note || '-'}</td>
                <td class="px-4 py-3">
                  ${r.drive_link ? `<a href="${r.drive_link}" target="_blank" class="text-blue-600 hover:text-blue-800 mr-3" title="Lihat File">🔗</a>` : ''}
                  <button onclick="del('${r.doc_id || r.id}')" class="text-red-600 hover:text-red-800" title="Hapus">🗑️</button>
                </td>
              </tr>
            `;
          }).join('');
        }
      } catch (e) {
        showToast('Gagal memuat laporan: ' + e.message, 'error');
        emptyEl.classList.remove('hidden');
        emptyEl.textContent = 'Error memuat data.';
      } finally {
        loadingEl.classList.add('hidden');
      }
    }

    async function del(id) {
      if (!confirm('⚠️ Yakin ingin menghapus laporan ini?\n\nTindakan ini tidak dapat dibatalkan dan file di Google Drive juga akan dihapus.')) return;
      
      if (!authToken) { logout(); return; }

      try {
        const res = await fetch(`${API_BASE}/api/admin-delete?id=${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });

        if (res.status === 401) {
          showToast('Sesi login telah berakhir.', 'warning');
          logout();
          return;
        }

        const data = await res.json();
        
        if (res.ok) {
          showToast('Laporan berhasil dihapus', 'success');
          loadReports();
        } else {
          showToast(data.error || 'Gagal menghapus', 'error');
        }
      } catch (e) {
        showToast('Error: ' + e.message, 'error');
      }
    }

    // ================= INIT =================
    document.addEventListener('DOMContentLoaded', () => {
      // Save original button text for loading state
      const btn = document.getElementById('auth-btn');
      btn.dataset.originalText = btn.textContent;
      
      // Auto-login if token exists
      if (authToken && currentUsername) {
        showDashboard();
      }
    });
  </script>
</body>
</html>
