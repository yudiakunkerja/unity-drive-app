<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard - PNM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <div id="login-form" class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 mt-20">
      <h2 class="text-2xl font-bold text-center text-teal-800 mb-6">🔐 Admin Login</h2>
      <input type="password" id="admin-password" placeholder="Password" class="w-full px-4 py-3 border rounded-lg mb-4">
      <button onclick="login()" class="w-full bg-teal-600 text-white py-3 rounded-lg font-bold">Login</button>
    </div>

    <div id="dashboard" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-teal-800">📊 Dashboard Laporan</h1>
        <button onclick="logout()" class="bg-red-600 text-white px-6 py-2 rounded-lg">Logout</button>
      </div>

      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-gray-600 text-sm">Total</p><p id="stat-total" class="text-3xl font-bold text-teal-600">0</p></div>
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-gray-600 text-sm">Site</p><p id="stat-site" class="text-3xl font-bold text-blue-600">0</p></div>
        <div class="bg-white p-4 rounded-xl shadow"><p class="text-gray-600 text-sm">Dokumen</p><p id="stat-doc" class="text-3xl font-bold text-green-600">0</p></div>
      </div>

      <div class="bg-white rounded-xl shadow overflow-x-auto">
        <table class="w-full">
          <thead class="bg-teal-600 text-white">
            <tr><th class="px-4 py-3 text-left">Waktu</th><th class="px-4 py-3 text-left">Tipe</th><th class="px-4 py-3 text-left">Lokasi</th><th class="px-4 py-3 text-left">Catatan</th><th class="px-4 py-3 text-left">Aksi</th></tr>
          </thead>
          <tbody id="reports-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let authToken = null;

    async function login() {
      const password = document.getElementById('admin-password').value;
      try {
        const res = await fetch('/api/admin-login', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${password}` }
        });
        if (res.ok) {
          authToken = password;
          document.getElementById('login-form').classList.add('hidden');
          document.getElementById('dashboard').classList.remove('hidden');
          loadReports();
        } else alert('Password salah!');
      } catch(e) { alert('Error: ' + e.message); }
    }

    function logout() { authToken = null; document.getElementById('dashboard').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }

    async function loadReports() {
      try {
        const res = await fetch('/api/admin-reports', { headers: { 'Authorization': `Bearer ${authToken}` } });
        const { reports } = await res.json();
        document.getElementById('stat-total').textContent = reports.length;
        document.getElementById('stat-site').textContent = reports.filter(r => r.type === 'site').length;
        document.getElementById('stat-doc').textContent = reports.filter(r => r.type === 'doc').length;
        
        document.getElementById('reports-table').innerHTML = reports.map(r => `
          <tr class="border-b hover:bg-gray-50">
            <td class="px-4 py-3">${new Date(r.timestamp).toLocaleString('id-ID')}</td>
            <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs ${r.type==='site'?'bg-blue-100 text-blue-800':'bg-green-100 text-green-800'}">${r.type==='site'?'📷 Site':'📄 Dokumen'}</span></td>
            <td class="px-4 py-3 text-sm">${r.location||'-'}</td>
            <td class="px-4 py-3 text-sm">${r.note||'-'}</td>
            <td class="px-4 py-3">
              <a href="${r.drive_link}" target="_blank" class="text-blue-600 mr-3">🔗</a>
              <button onclick="del('${r.id}')" class="text-red-600">🗑️</button>
            </td>
          </tr>
        `).join('');
      } catch(e) { alert('Error: ' + e.message); }
    }

    async function del(id) {
      if (!confirm('Hapus laporan ini?')) return;
      try {
        const res = await fetch(`/api/admin-delete?id=${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${authToken}` } });
        if (res.ok) { alert('Terhapus'); loadReports(); }
        else alert('Gagal menghapus');
      } catch(e) { alert('Error: ' + e.message); }
    }
  </script>
</body>
</html>
